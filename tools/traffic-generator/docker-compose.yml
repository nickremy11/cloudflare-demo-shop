# Pairs the traffic generator with selenium/standalone-chrome on the same
# Docker network. Selenium's official image ships Chrome + driver + a Grid
# endpoint at :4444/wd/hub, which removes the need to install Chrome on
# your VM directly.
#
#   cd tools/traffic-generator
#   export TARGET_URL=https://remydemo.com/client-side-security/checkout
#   docker compose up --build -d
#   docker compose logs -f traffic
#
# Stop:
#   docker compose down

services:
  selenium:
    # Official Selenium image — ships Chrome + chromedriver + Grid endpoint
    # at :4444/wd/hub. Pinned to a recent stable major; bump as needed.
    image: selenium/standalone-chrome:148.0
    shm_size: 2gb
    ports:
      - "127.0.0.1:4444:4444"
    environment:
      - SE_NODE_MAX_SESSIONS=4
      - SE_NODE_OVERRIDE_MAX_SESSIONS=true
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4444/status | grep -q '\"ready\": true' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  traffic:
    build: .
    depends_on:
      selenium:
        condition: service_healthy
    environment:
      - TARGET_URL=${TARGET_URL:?TARGET_URL is required}
      - SELENIUM_URL=http://selenium:4444/wd/hub
      - FORCE_CSP=${FORCE_CSP:-1}
      # 1 worker by default. The runner recycles the browser session per
      # visit (see RECYCLE_EACH_VISIT) so a single worker is enough to
      # seed inventory and keep resources in "active" status.
      - WORKERS=${WORKERS:-1}
      - INTERVAL_S=${INTERVAL_S:-60}
      - JITTER_S=${JITTER_S:-15}
      - SUBMIT_FORM=${SUBMIT_FORM:-1}
      - PAGE_DWELL_S=${PAGE_DWELL_S:-4}
      # Recycle the browser session per visit so script URLs reload from
      # the network instead of being served by Chrome's in-memory cache.
      # This is what makes the same script URL move from "infrequent" to
      # "active" in Client-Side Security. Set to 0 after inventory has
      # been seeded if you want a longer-lived browser session.
      - RECYCLE_EACH_VISIT=${RECYCLE_EACH_VISIT:-1}
      # Run headed under the selenium image's Xvfb. Headless Chrome
      # currently scores poorly with Cloudflare Bot Management on this
      # zone, which suppresses CSP reporting upstream.
      - HEADLESS=${HEADLESS:-0}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - BROWSER=chrome
    restart: unless-stopped
