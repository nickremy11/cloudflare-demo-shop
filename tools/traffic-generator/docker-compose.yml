# Pairs the traffic generator with selenium/standalone-chrome on the same
# Docker network. Selenium's official image ships Chrome + driver + a Grid
# endpoint at :4444/wd/hub, which removes the need to install Chrome on
# your VM directly.
#
#   cd tools/traffic-generator
#   export TARGET_URL=https://home.remydemo.com/client-side-security/checkout
#   docker compose up --build -d
#   docker compose logs -f traffic
#
# Stop:
#   docker compose down

services:
  selenium:
    image: selenium/standalone-chrome:127.0
    shm_size: 2gb
    ports:
      - "127.0.0.1:4444:4444"
    environment:
      - SE_NODE_MAX_SESSIONS=4
      - SE_NODE_OVERRIDE_MAX_SESSIONS=true
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4444/status | grep -q '\"ready\": true' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  traffic:
    build: .
    depends_on:
      selenium:
        condition: service_healthy
    environment:
      - TARGET_URL=${TARGET_URL:?TARGET_URL is required}
      - SELENIUM_URL=http://selenium:4444/wd/hub
      - FORCE_CSP=${FORCE_CSP:-1}
      - WORKERS=${WORKERS:-2}
      - INTERVAL_S=${INTERVAL_S:-25}
      - JITTER_S=${JITTER_S:-10}
      - SUBMIT_FORM=${SUBMIT_FORM:-1}
      - PAGE_DWELL_S=${PAGE_DWELL_S:-4}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - HEADLESS=1
      - BROWSER=chrome
    restart: unless-stopped
