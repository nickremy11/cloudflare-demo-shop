name = "cloudflare-demo-shop"
compatibility_date = "2024-09-23"
pages_build_output_dir = "dist"

# workers_dev intentionally not set (defaults to false for Pages projects)
# This site is served via Cloudflare Pages, not workers.dev

# ── Plain-text runtime variables ───────────────────────────
# Available on c.env in Pages Functions. Source of truth for non-secret config.
# Secrets (CF_CACHE_PURGE_TOKEN, TURNSTILE_SECRET, AIG_TOKEN) live in the dashboard.
[vars]
CF_ZONE_ID = "00fe352511075ed27384acfcb5828e51"
CF_ACCOUNT_ID = "e2e9b1cd0acebaaf2aee23d918eee2b1"
TURNSTILE_SITE_KEY = "0x4AAAAAADnbsExT-_BvgdJT"

# ── R2 Storage Demo Bindings ────────────────────────────────
# R2 bucket for file storage
[[r2_buckets]]
binding = "STORAGE_BUCKET"
bucket_name = "demo-shop-storage"

# R2 bucket for architecture diagrams
[[r2_buckets]]
binding = "DIAGRAMS_BUCKET"
bucket_name = "demo-shop-diagrams"

# KV namespace for file metadata + KV demo (demo-kv: prefix)
[[kv_namespaces]]
binding = "DEMO_KV"
id = "718464f9865547c68d5e62aaefe9db85"

# D1 database for the SQL demo (products table)
[[d1_databases]]
binding = "demo_d1"
database_name = "demo-d1"
database_id = "296d1067-4549-4116-9951-c83bad3b502f"

# ── AI binding for chatbot ─────────────────────────────────
[ai]
binding = "AI"

# ── About Me RAG Worker service binding ─────────────────────
# Pages Functions call this standalone Worker, which owns the AI Search binding.
[[services]]
binding = "ABOUTME_RAG"
service = "demo-shop-aboutme-rag"

# ── Durable Objects: Chat Room demo ────────────────────────
# The ChatRoom DO class is defined in the standalone `demo-shop-chat`
# Worker (see chat-worker/). Pages binds to it by script_name.
# Deploy chat-worker FIRST, then deploy Pages:
#   npx wrangler deploy --config chat-worker/wrangler.toml
#   npm run deploy
[[durable_objects.bindings]]
name = "CHAT_ROOM"
class_name = "ChatRoom"
script_name = "demo-shop-chat"

# ── Email Service Demo ──────────────────────────────────────
# Pages Functions do NOT support the `send_email` Workers binding — email
# sending here goes over the Email Sending REST API instead, using
# CF_ACCOUNT_ID (above) + the EMAIL_API_TOKEN secret below. The sender is
# fixed to support@remydemo.com server-side; the visitor only picks the
# recipient. Requires remydemo.com onboarded to Email Sending.

# ── Cache Purge Demo Variables ─────────────────────────────
# These need to be set in the Cloudflare Pages dashboard:
#   - CF_ZONE_ID:           plain text env var (your zone ID for remydemo.com)
#   - CF_ACCOUNT_ID:        plain text env var (RemyDemo account ID)
#   - CF_CACHE_PURGE_TOKEN: secret (API token with Cache Purge permission)
#   - TURNSTILE_SECRET:     secret (Turnstile widget secret key)
#   - AIG_TOKEN:            secret (AI Gateway authentication token)
#   - EMAIL_API_TOKEN:      secret (API token with Email Sending: Edit permission)
#
# Set via:  wrangler pages secret put <NAME>
# Or in the Pages dashboard: Settings → Environment variables
